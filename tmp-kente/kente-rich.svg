<svg width="80" height="40" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Top header band (y=0-8): colored sections + accent lines, visible in 8px strips -->
  <rect width="20" height="8" fill="#047857"/>
  <rect x="0" y="3" width="20" height="2" fill="#D4AF37"/>
  <rect x="20" width="20" height="8" fill="#F59E0B"/>
  <rect x="20" y="3" width="20" height="2" fill="#047857"/>
  <rect x="40" width="20" height="8" fill="#047857"/>
  <rect x="40" y="3" width="20" height="2" fill="#D4AF37"/>
  <rect x="60" width="20" height="8" fill="#F59E0B"/>
  <rect x="60" y="3" width="20" height="2" fill="#047857"/>

  <!-- Body band (y=8-32): rich motifs -->
  <!-- Section 1 body: Emerald bg with diamond + cross -->
  <rect y="8" width="20" height="24" fill="#047857"/>
  <path d="M10,11 L17,18 L10,25 L3,18 Z" fill="#F59E0B" stroke="#000000" stroke-width="0.6"/>
  <path d="M10,14 L14,18 L10,22 L6,18 Z" fill="#047857" stroke="#000000" stroke-width="0.4"/>
  <path d="M10,16 L12,18 L10,20 L8,18 Z" fill="#D4AF37"/>

  <!-- Section 2 body: Amber bg with triangles -->
  <rect x="20" y="8" width="20" height="24" fill="#F59E0B"/>
  <path d="M22,11 L38,11 L30,21 Z" fill="#047857" stroke="#000000" stroke-width="0.6"/>
  <path d="M22,29 L38,29 L30,19 Z" fill="#C2410C" stroke="#000000" stroke-width="0.6"/>

  <!-- Section 3 body: Emerald bg with gold + amber diamonds -->
  <rect x="40" y="8" width="20" height="24" fill="#047857"/>
  <path d="M50,11 L57,18 L50,25 L43,18 Z" fill="#D4AF37" stroke="#000000" stroke-width="0.6"/>
  <path d="M50,14 L54,18 L50,22 L46,18 Z" fill="#047857"/>
  <path d="M50,16 L52,18 L50,20 L48,18 Z" fill="#F59E0B"/>

  <!-- Section 4 body: Amber bg with zigzags -->
  <rect x="60" y="8" width="20" height="24" fill="#F59E0B"/>
  <path d="M60,15 L65,11 L70,15 L75,11 L80,15" fill="none" stroke="#000000" stroke-width="1.5" stroke-linejoin="miter"/>
  <path d="M60,21 L65,25 L70,21 L75,25 L80,21" fill="none" stroke="#000000" stroke-width="1.5" stroke-linejoin="miter"/>
  <line x1="60" y1="18" x2="80" y2="18" stroke="#D4AF37" stroke-width="0.8"/>

  <!-- Bottom band (y=32-40): mirrors top for vertical tiling -->
  <rect y="32" width="20" height="8" fill="#047857"/>
  <rect x="0" y="35" width="20" height="2" fill="#D4AF37"/>
  <rect x="20" y="32" width="20" height="8" fill="#F59E0B"/>
  <rect x="20" y="35" width="20" height="2" fill="#047857"/>
  <rect x="40" y="32" width="20" height="8" fill="#047857"/>
  <rect x="40" y="35" width="20" height="2" fill="#D4AF37"/>
  <rect x="60" y="32" width="20" height="8" fill="#F59E0B"/>
  <rect x="60" y="35" width="20" height="2" fill="#047857"/>
</svg>
